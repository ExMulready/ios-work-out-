#
#  project.yml — XcodeGen spec for Salvager
#
#  Generates Salvager.xcodeproj from the loose Swift sources, so the app can be
#  built without hand-writing a fragile .pbxproj. Run `xcodegen generate` (on a
#  Mac, or in CI on a macOS runner) to produce the project, then build with
#  Xcode or `xcodebuild`.
#
#  Targets:
#   • Salvager            — iOS companion app (embeds the Watch app)
#   • Salvager Watch App  — the watchOS game (embeds the Widget)
#   • SalvagerWidget      — watchOS widget/complication extension
#
#  NOTE: this spec is authored without a Mac to test it; the first CI builds may
#  need small fixes (embedding, entitlements, Info.plist keys). Iterate via the
#  Actions logs.
#

name: Salvager

options:
  bundleIdPrefix: com.salvager
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # Simulator CI builds don't sign; real device/App Store builds do.
    CODE_SIGN_STYLE: Automatic

targets:

  # ---------------- iOS companion app ----------------
  Salvager:
    type: application
    platform: iOS
    sources:
      - iOSApp
      - Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.salvager
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Salvager
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: Salvager Watch App
        embed: true
    entitlements:
      path: Config/Salvager.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.salvager.shared

  # ---------------- watchOS game ----------------
  Salvager Watch App:
    type: application
    platform: watchOS
    sources:
      - WatchApp
      - Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.salvager.watchkitapp
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Salvager
        INFOPLIST_KEY_WKApplication: "YES"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.salvager
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Salvager uses your activity (active energy and exercise minutes) to power up your rig."
        TARGETED_DEVICE_FAMILY: "4"
    dependencies:
      - target: SalvagerWidget
        embed: true
    entitlements:
      path: Config/SalvagerWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.salvager.shared
        com.apple.developer.healthkit: true

  # ---------------- watchOS widget / complication ----------------
  SalvagerWidget:
    type: app-extension
    platform: watchOS
    sources:
      - WatchWidget
      - Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.salvager.watchkitapp.widget
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Salvager
        INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Config/SalvagerWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.salvager.shared
