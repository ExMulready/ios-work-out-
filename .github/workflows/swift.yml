name: Swift

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  core:
    name: Build & test core game logic
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build SalvagerCore
        run: swift build -v

      - name: Run tests
        run: swift test -v

  # ------------------------------------------------------------------
  # Full app build: generate the Xcode project from project.yml with
  # XcodeGen, then build the iOS app (which embeds the Watch app + Widget)
  # for the simulator with signing disabled. No Mac needed locally.
  # ------------------------------------------------------------------
  app:
    name: Generate & build app (Xcode)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List schemes
        run: xcodebuild -list -project Salvager.xcodeproj

      - name: Build app (iOS Simulator, no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Salvager.xcodeproj \
            -scheme "Salvager" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
